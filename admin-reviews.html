<style>

body{
font-family:Arial, Helvetica, sans-serif;

h1{

.review-card{

.review-message{

}

button{
border:none;

border-radius:8px;
cursor:pointer;
font-weight:700;

}

background:#10b981;
color:white;
}

.reject{
background:#ef4444;
color:white;
}

<body>

<h1>Pending Reviews</h1>

<div id="reviewList"></div>

<script>

const SUPABASE_URL = "https://qdysdamxttccpgetscai.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkeXNkYW14dHRjY3BnZXRzY2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjIxNTQsImV4cCI6MjA4ODczODE1NH0.0w-9JyX9AMkWoCQ7LYuIeIdEH3Vx1XDGaglmDCOI8k8";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

async function loadReviews(){

const { data, error } = await supabaseClient
.from("reviews")
.select("*")
.eq("approved", false)
.eq("rejected", false)
.order("created_at", { ascending:false });

const list = document.getElementById("reviewList");

if(error){
list.innerHTML="Error loading reviews";
return;
}

if(!data.length){
list.innerHTML="No pending reviews.";
return;
}

list.innerHTML=data.map(r => `

<div class="review-card">

<div class="review-title">${r.review_title}</div>

<div class="review-meta">
${r.review_name} • ${r.review_relationship || ""}
</div>

<div class="review-message">
${r.review_message}
</div>

<button class="approve" onclick="approveReview('${r.id}')">
Approve
</button>

<button class="reject" onclick="rejectReview('${r.id}')">
Reject
</button>

</div>

`).join("");

}

async function approveReview(id){

await supabaseClient
.from("reviews")
.update({
approved:true,
approved_at:new Date().toISOString()
})
.eq("id",id);

loadReviews();

}

async function rejectReview(id){

await supabaseClient
.from("reviews")
.update({
rejected:true,
rejected_at:new Date().toISOString()
})
.eq("id",id);

loadReviews();

}

loadReviews();

</script>

</body>
</html>
